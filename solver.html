<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=0">
    <title>KB Solver v10</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #box { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #444; text-align: center; min-width: 250px; }
        .success { color: #4caf50; font-weight: bold; }
        .wait { color: #ff9800; }
    </style>
</head>
<body>
    <div id="box">
        <h3 style="margin:0 0 10px 0;color:#00bcd4;">KB Solver v10</h3>
        <div id="info" class="wait">Memeriksa Task...</div>
        <div id="captcha-area" style="margin-top:15px;min-height:80px;display:flex;justify-content:center;"></div>
    </div>

    <script>
        const FIREBASE_URL = "https://kb-relay-default-rtdb.asia-southeast1.firebasedatabase.app";
        const p = new URLSearchParams(window.location.search);
        const tId = p.get('id');
        const type = p.get('type');
        const sitekey = p.get('sitekey');
        const info = document.getElementById('info');

        async function sendTokenAndBack(token) {
            info.innerHTML = "Mengirim Token ke Firebase...";
            info.className = "wait";
            await fetch(`${FIREBASE_URL}/tokens/${tId}.json`, { 
                method: 'PUT', body: JSON.stringify({ token: token, ts: Date.now() }) 
            });
            await fetch(`${FIREBASE_URL}/queue/${tId}.json`, { method: 'DELETE' });
            
            info.innerHTML = "✅ Selesai! Kembali...";
            info.className = "success";
            setTimeout(() => { window.history.back(); }, 1000);
        }

        if (!tId || !sitekey) {
            info.innerHTML = "Standby Ready.<br><span style='font-size:10px;color:#666;'>Tunggu Worker Tampermonkey.</span>";
        } else {
            if (type === 'v3') {
                info.innerHTML = `Solving V3<br><span style='font-size:10px;color:#888'>${sitekey}</span>`;
                
                const s = document.createElement('script');
                s.src = `https://www.google.com/recaptcha/api.js?render=${sitekey}`;
                document.head.appendChild(s);
                
                s.onload = () => {
                    grecaptcha.ready(() => {
                        grecaptcha.execute(sitekey, { action: 'submit' }).then(token => {
                            sendTokenAndBack(token);
                        });
                    });
                };
            } 
            else if (type === 'v2') {
                info.innerHTML = `Centang Checkbox Dibawah`;
                
                window.onV2Success = function(token) {
                    sendTokenAndBack(token);
                };

                const div = document.createElement('div');
                div.className = "g-recaptcha";
                div.setAttribute("data-sitekey", sitekey);
                div.setAttribute("data-callback", "onV2Success");
                document.getElementById('captcha-area').appendChild(div);

                const s = document.createElement('script');
                s.src = "https://www.google.com/recaptcha/api.js";
                document.head.appendChild(s);
            }
        }
    </script>
</body>
</html>
