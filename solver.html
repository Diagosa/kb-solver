<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>KB Solver v8.0</title>
    <style>
        body {
            background: #1B1D25;
            color: #eaeaea;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #container {
            text-align: center;
            max-width: 380px;
            padding: 20px;
        }
        .status {
            font-size: 15px;
            margin: 15px 0;
            color: #aaa;
        }
        .v2-container {
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin: 20px auto;
            display: none;
        }
        .spin {
            border: 4px solid #333;
            border-top-color: #00bcd4;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #success { display: none; color: #4caf50; font-size: 18px; }
    </style>
</head>
<body>

<div id="container">
    <div class="status" id="status">Memuat CAPTCHA...</div>
    
    <!-- V2 Area -->
    <div id="v2-area" class="v2-container">
        <div id="kb-recaptcha"></div>
    </div>

    <!-- V3 Area -->
    <div id="v3-area">
        <div class="spin"></div>
        <div class="status">Menjalankan ReCAPTCHA v3...</div>
    </div>

    <!-- Success -->
    <div id="success">
        ✅ Token berhasil dikirim!<br>
        Kembali otomatis...
    </div>
</div>

<script>
(function() {
    'use strict';

    const params = new URLSearchParams(location.search);
    const taskId = params.get('kb_task_id');
    const type = (params.get('kb_type') || 'v3').toLowerCase();
    const sitekey = params.get('kb_sitekey') || '';
    const action = params.get('kb_action') || 'submit';
    const isEnterprise = params.get('kb_enterprise') === '1';
    const fbUrl = params.get('kb_fb') || 'https://kb-relay-default-rtdb.asia-southeast1.firebasedatabase.app';

    let tokenSent = false;

    function sendToken(token) {
        if (tokenSent) return;
        tokenSent = true;

        document.getElementById('status').textContent = 'Mengirim token...';
        
        fetch(fbUrl + '/tokens/' + taskId + '.json', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, solvedAt: Date.now(), type: type })
        }).then(() => {
            fetch(fbUrl + '/queue/' + taskId + '.json', { method: 'DELETE' });
            document.getElementById('success').style.display = 'block';
            setTimeout(() => location.href = location.pathname, 2500);
        }).catch(() => {
            document.getElementById('status').textContent = 'Gagal mengirim token';
        });
    }

    // ==================== V2 ====================
    if (type === 'v2') {
        document.getElementById('v2-area').style.display = 'block';
        document.getElementById('status').textContent = 'Tunggu checkbox muncul';

        window.postRecaptchaMessageJs = function(token) {
            sendToken(token);
        };

        const div = document.createElement('div');
        div.className = 'g-recaptcha';
        div.setAttribute('data-sitekey', sitekey);
        div.setAttribute('data-callback', 'postRecaptchaMessageJs');
        if (isEnterprise) div.setAttribute('data-enterprise', 'true');
        document.getElementById('kb-recaptcha').appendChild(div);

        const script = document.createElement('script');
        script.src = 'https://www.google.com/recaptcha/api.js?onload=onV2Load&render=explicit';
        script.async = true;
        document.head.appendChild(script);
    }

    // ==================== V3 ====================
    if (type === 'v3') {
        document.getElementById('v3-area').style.display = 'block';

        const script = document.createElement('script');
        script.src = isEnterprise 
            ? `https://www.google.com/recaptcha/enterprise.js?render=${sitekey}`
            : `https://www.google.com/recaptcha/api.js?render=${sitekey}`;
        script.async = true;
        document.head.appendChild(script);

        script.onload = () => {
            const gre = isEnterprise ? grecaptcha.enterprise : grecaptcha;
            gre.ready(() => {
                gre.execute(sitekey, {action: action}).then(token => {
                    sendToken(token);
                }).catch(err => {
                    console.error(err);
                });
            });
        };
    }

    // Safety timeout
    setTimeout(() => {
        if (!tokenSent) {
            document.getElementById('status').innerHTML = 'Timeout.<br>Kembali ke standby...';
            setTimeout(() => location.href = location.pathname, 2000);
        }
    }, 120000);

})();
</script>
</body>
</html>
