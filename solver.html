<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL: Lock viewport for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KB Solver Worker</title>
    <style>
        /* --- CSS RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #121212; /* Dark theme */
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Prevent scroll on main body */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- CONTAINER UTAMA (STANDBY MODE) --- */
        #app-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        .logo-area {
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 64px;
            margin-bottom: 10px;
            display: block;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        /* Status Card */
        .status-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .status-row:last-child { border-bottom: none; }
        
        .label { font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .value { font-size: 15px; font-weight: 600; color: #fff; font-family: monospace; }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        .bg-green { background-color: #4caf50; box-shadow: 0 0 0 0 rgba(76,175,80, 0.4); }
        .bg-red { background-color: #f44336; box-shadow: 0 0 0 0 rgba(244,67,54, 0.4); }
        .bg-yellow { background-color: #ff9800; box-shadow: 0 0 0 0 rgba(255,152,0, 0.4); }
        .bg-blue { background-color: #2196f3; box-shadow: 0 0 0 0 rgba(33,150,243, 0.4); }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        /* Log Area */
        #log-box {
            background: #000;
            border-radius: 12px;
            padding: 15px;
            height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #4caf50;
            text-align: left;
            border: 1px solid #333;
            margin-top: 10px;
            scrollbar-width: thin;
            scrollbar-color: #333 #000;
        }
        .log-entry { margin-bottom: 4px; word-break: break-all; line-height: 1.4; }
        .log-warn { color: #ff9800; }
        .log-error { color: #f44336; }
        .log-info { color: #2196f3; }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* OVERLAY HIDDEN (Untuk SOLVING MODE) */
        #solving-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #1B1D25;
            z-index: 999999; /* Di atas segalanya */
            display: none; /* Hidden by default */
            flex-direction: column;
        }
        #solving-overlay.active { display: flex; }

        /* Footer Fix */
        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: #555;
        }
    </style>
</head>
<body>

    <!-- MODE 1: STANDBY INTERFACE -->
    <div id="standby-view">
        <div id="app-container">
            <div class="logo-area">
                <span class="logo-icon">🤖</span>
                <div class="title">KB Solver Worker</div>
                <div class="subtitle">v7.9.1 • Standby Mode</div>
            </div>

            <div class="status-card">
                <div class="status-row">
                    <span class="label"><span class="pulse-dot bg-green"></span>Server</span>
                    <span class="value" id="st-fb">Cek...</span>
                </div>
                <div class="status-row">
                    <span class="label">Tugas Done</span>
                    <span class="value" id="st-done" style="color:#4caf50">0</span>
                </div>
                <div class="status-row">
                    <span class="label">Antrian</span>
                    <span class="value" id="st-pend" style="color:#ff9800">0</span>
                </div>
                <div class="status-row">
                    <span class="label">Status</span>
                    <span class="value" id="st-worker" style="color:#aaa">Idle</span>
                </div>
                
                <div style="margin-top:15px;">
                    <div class="spinner" id="load-spin"></div>
                    <div id="st-action" style="font-size:12px; color:#888;">Menunggu tugas...</div>
                </div>
            </div>

            <div id="log-box">
                <div class="log-entry log-info">[System] Initializing Worker...</div>
            </div>
        </div>
        <footer>KB Patch • Tampermonkey Compatible</footer>
    </div>

    <!-- MODE 2: SOLVING CONTAINER (Hidden initially) -->
    <div id="solving-overlay">
        <!-- Konten captcha akan di-inject di sini oleh script -->
        <div id="kb-captcha-host" style="width:100%;height:100%;display:flex;justify-content:center;align-items:center;padding:20px;"></div>
    </div>

<script>
/**
 * KB ANDROID WORKER v7.9.1 - STANDALONE VERSION
 * Bisa dijalankan sebagai file .html langsung di Android Kiwi Browser
 */

(function() {
'use strict';

// ==========================================
// KONFIGURASI
// ==========================================
const FIREBASE_URL = "https://kb-relay-default-rtdb.asia-southeast1.firebasedatabase.app";
const POLL_MS = 2500; // Lebih cepat sedikit untuk responsif
const DEBUG = true;

// ==========================================
// UTILITAS LOGGING (KE UI HTML)
// ==========================================
const logBox = document.getElementById('log-box');
function addLog(msg, type='info') {
    const time = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const div = document.createElement('div');
    div.className = `log-entry log-${type}`;
    div.innerText = `[${time}] ${msg}`;
    // Insert at top so newest is first
    if(logBox.firstChild) logBox.insertBefore(div, logBox.firstChild);
    else logBox.appendChild(div);
    
    // Limit logs to 50 entries
    if(logBox.children.length > 50) logBox.removeChild(logBox.lastChild);
    
    if(DEBUG) console.log(msg);
}

function updateUI(id, val, colorClass) {
    const el = document.getElementById(id);
    if(el) {
        el.innerText = val;
        if(colorClass) el.style.color = colorClass;
    }
}

// ==========================================
// CEK MODE: SOLVING vs STANDBY
// ==========================================
const urlParams = new URLSearchParams(window.location.search);
const isSolverPage = urlParams.get('kb_task_id') !== null;

if (isSolverPage) {
    // JIKA ADA PARAMETER TASK -> MODE SOLVING (Overlay)
    addLog('Mode SOLVING aktif! Task ID terdeteksi.', 'info');
    document.getElementById('standby-view').style.display = 'none';
    const overlay = document.getElementById('solving-overlay');
    overlay.classList.add('active');
    
    // Trigger solving logic
    startSolvingMode(urlParams, overlay);
} else {
    // TIDAK ADA PARAMETER -> MODE STANDBY (Dashboard)
    addLog('Mode STANDBY. Memulai polling...', 'info');
    startStandbyMode();
}


// ==========================================
// MODE A: STANDBY POLLING (MENUNGGU TUGAS)
// ==========================================
let pollCount = 0;
let doneCount = 0;
let isPolling = true;
let processedIds = new Set();

async function checkHealth() {
    try {
        const res = await fetch(`${FIREBASE_URL}/health/android.json`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ts: Date.now(), online: true})
        });
        if(res.ok) updateUI('st-fb', '✅ Online', '#4caf50');
        else updateUI('st-fb', '⚠️ Error', '#f44336');
    } catch(e) {
        updateUI('st-fb', '❌ Offline', '#f44336');
        addLog('Gagal koneksi Firebase.', 'error');
    }
}

async function pollTask() {
    if(!isPolling) return;
    
    pollCount++;
    document.getElementById('load-spin').style.display = 'block';
    updateUI('st-action', `Polling (#${pollCount})...`);

    try {
        const res = await fetch(`${FIREBASE_URL}/queue.json`);
        const data = await res.json();
        
        document.getElementById('load-spin').style.display = 'none';

        if (!data || Object.keys(data).length === 0) {
            updateUI('st-action', 'Menunggu tugas...');
            return;
        }

        // Cari task valid (prioritas paling lama)
        let targetKey = null;
        let targetItem = null;
        const keys = Object.keys(data).sort((a,b) => (data[a].createdAt||0) - (data[b].createdAt||0));

        for(let key of keys) {
            const item = data[key];
            // Validasi dasar
            if(item && item.taskId && !processedIds.has(item.taskId) && item.status !== 'processing' && item.status !== 'done') {
                // Cek expiry (anti-zombie)
                if(item.expiresAt && item.expiresAt < Date.now()) {
                     addLog(`Task ${item.taskId} expired, cleaning...`, 'warn');
                     cleanUpTask(item.taskId);
                     continue;
                }
                targetKey = key;
                targetItem = item;
                break;
            }
        }

        if(targetItem) {
            isPolling = false; // Pause polling saat kerja
            handleNewTask(targetItem, targetKey);
        } else {
             updateUI('st-action', 'Antrian kosong / semua diproses.');
        }

    } catch(e) {
        document.getElementById('load-spin').style.display = 'none';
        addLog(`Error Polling: ${e.message}`, 'error');
        updateUI('st-action', 'Error fetching queue.');
    }
}

async function handleNewTask(item, key) {
    const taskId = item.taskId;
    const type = (item.type || 'v3').toUpperCase();
    
    addLog(`🎯 Task Ditemukan! [${type}] ${taskId}`, 'info');
    
    // Update status UI
    updateUI('st-worker', '🔄 Mengerjakan...', '#ff9800');
    updateUI('st-pend', parseInt(document.getElementById('st-pend').innerText)+1);

    try {
        // Mark as processing di server
        await fetch(`${FIREBASE_URL}/queue/${taskId}.json`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: 'processing'})
        });

        processedIds.add(taskId);
        
        // Redirect diri sendiri (refresh dengan parameter)
        // Menggunakan location.replace agar back button tidak stack
        const params = new URLSearchParams({
            kb_task_id: taskId,
            kb_type: type.toLowerCase(),
            kb_sitekey: item.sitekey || '',
            kb_action: item.pageAction || 'submit',
            kb_enterprise: item.isEnterprise ? '1' : '0',
            kb_fb: FIREBASE_URL,
            _t: Date.now() // Cache buster
        });
        
        // Delay sebentar supaya user liat status "Mengerjakan" dulu
        setTimeout(() => {
            window.location.href = `${window.location.pathname}?${params.toString()}`;
        }, 1000);

    } catch(err) {
        addLog(`Gagal init task: ${err.message}`, 'error');
        isPolling = true; // Resume
    }
}

async function cleanUpTask(taskId) {
    try {
        await fetch(`${FIREBASE_URL}/tasks/${taskId}.json`, {method:'DELETE'});
        await fetch(`${FIREBASE_URL}/queue/${taskId}.json`, {method:'DELETE'});
    } catch(e){}
}

function startStandbyMode() {
    // Cek health setiap 30 detik
    setInterval(checkHealth, 30000);
    checkHealth(); // Initial cek
    
    // Polling utama
    setInterval(pollTask, POLL_MS);
    pollTask(); // Initial poll

    // Monitor token count (untuk statistik)
    setInterval(async () => {
        try {
            const res = await fetch(`${FIREBASE_URL}/tokens.json`);
            const data = await res.json();
            if(data) {
                const keys = Object.keys(data).filter(k => data[k] && data[k].token);
                updateUI('st-done', keys.length);
            }
        } catch(e){};
    }, 5000);
}


// ==========================================
// MODE B: SOLVING ACTUAL (INJECT CAPTCHA)
// ==========================================
function startSolvingMode(params, containerEl) {
    const taskId = params.get('kb_task_id');
    const type = params.get('kb_type'); // v2 or v3
    const sitekey = params.get('kb_sitekey');
    const action = params.get('kb_action') || 'submit';
    const isEnterprise = params.get('kb_enterprise') === '1';
    
    // Inject Google Recaptcha API Script jika belum ada
    loadRecaptchaAPI(sitekey, type, isEnterprise, function(grecaptcha) {
        if(type === 'v2') solveV2(grecaptcha, sitekey, action, taskId);
        else solveV3(grecaptcha, sitekey, action, taskId);
    });
}

function loadRecaptchaAPI(sitekey, type, isEnterprise, callback) {
    // Cek apakah grecaptcha sudah load oleh situs asli (kalau kita overlay)
    if(window.grecaptcha && window.grecaptcha.render) {
        callback(window.grecaptcha);
        return;
    }

    addLog("Loading reCAPTCHA API...", 'info');
    
    // Tentukan script URL
    let apiSrc = '';
    if(isEnterprise) {
         apiSrc = `https://www.google.com/recaptcha/enterprise.js?render=explicit&onload=onApiLoad`;
    } else {
         // Untuk V2 checkbox, kita perlu render explicit, tapi library standar juga ok
         apiSrc = `https://www.google.com/recaptcha/api.js?render=explicit&onload=onApiLoad`;
    }

    // Global callback handler
    window.onApiLoad = function() {
        addLog("API Loaded. Rendering...", 'success');
        callback(window.grecaptcha);
    };

    const script = document.createElement('script');
    script.src = apiSrc;
    script.async = true;
    script.defer = true;
    script.onerror = () => addLog("Gagal load reCAPTCHA API!", 'error');
    document.head.appendChild(script);
}

function solveV2(api, sitekey, action, taskId) {
    const hostDiv = document.getElementById('kb-captcha-host');
    hostDiv.innerHTML = '<div style="color:white;text-align:center;padding:40px;">Loading Widget...</div>';
    
    try {
        // Render widget V2
        const widgetId = api.render(hostDiv, {
            sitekey: sitekey,
            theme: 'dark',
            size: 'normal',
            callback: function(token) {
                addLog("Token V2 didapat!", 'success');
                submitToken(taskId, token, 'v2');
            },
            'expired-callback': function() {
                 addLog("Expired, refresh widget...", 'warn');
                 // Opsi reset manual bisa ditambahkan
            }
        });

        // Helper: Coba klik checkbox otomatis (trik lama untuk mobile)
        const clickInterval = setInterval(() => {
            const frame = document.querySelector('.g-recaptcha iframe') || document.querySelector('#rc-imageselect'); // V2 challenge iframe
            
            // Jika muncul challenge baru, coba focus
            // Catatan: Cross-origin limitation sering menghalangi ini, tapi kadang works via accessibility
            try {
                const cb = document.querySelector('.recaptcha-checkbox-border');
                if(cb && cb.getBoundingClientRect().width > 0) {
                    // cb.click(); // Kadang works kadang block
                }
            }catch(e){}
            
            // Stop interval kalau token sudah sent
        }, 1000);

        setTimeout(() => clearInterval(clickInterval), 120000); // Timeout 2 menit max V2

    } catch(err) {
        addLog(`Error render V2: ${err.message}`, 'error');
    }
}

function solveV3(api, sitekey, action, taskId) {
    const hostDiv = document.getElementById('kb-captcha-host');
    hostDiv.innerHTML = `
        <div style="text-align:center;color:#fff;margin-bottom:20px;">
            <h3>Solving ReCAPTCHA v3...</h3>
            <p>Harap tunggu sebentar.</p>
            <div class="spinner" style="display:inline-block;"></div>
        </div>
    `;
    
    try {
        api.execute(sitekey, {action: action}).then(function(token) {
            if(token) {
                addLog(`Token V3 sukses (${token.length} chars)`, 'success');
                submitToken(taskId, token, 'v3');
            } else {
                addLog("Token V3 kosong (Invalid Sitekey?)", 'error');
                goHome();
            }
        }).catch(function(err) {
            addLog(`Execute error: ${err.message}`, 'error');
            goHome();
        });
    } catch(err) {
        addLog(`API Error: ${err.message}`, 'error');
        goHome();
    }
}

async function submitToken(taskId, token, type) {
    updateUI('st-worker', '📤 Kirim Token...', '#2196f3');
    
    // 1. Simpan ke Firebase Token collection
    try {
        await fetch(`${FIREBASE_URL}/tokens/${taskId}.json`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                token: token, 
                solvedAt: Date.now(), 
                type: type
            })
        });
        addLog("Token tersimpan di DB.", 'success');

        // 2. Hapus dari Queue
        await fetch(`${FIREBASE_URL}/queue/${taskId}.json`, {method:'DELETE'});
        
        // 3. Success Screen
        showSuccess(token, type);
        
        // 4. Cleanup dan pulang setelah 3 detik
        setTimeout(goHome, 3000);

    } catch(err) {
        addLog(`Gagal simpan token: ${err.message}`, 'error');
        updateUI('st-worker', '❌ Gagal Kirim', '#f44336');
        setTimeout(goHome, 4000); // Pulang juga walaupun gagal
    }
}

function goHome() {
    window.location.replace(window.location.pathname); // Kembali ke standby (hapus query string)
}

function showSuccess(token, type) {
    const container = document.getElementById('solving-overlay');
    container.innerHTML = `
        <div style="text-align:center;color:#4caf50;padding:20px;width:100%;">
            <div style="font-size:64px;margin-bottom:20px;">✅</div>
            <h2>TOKEN BERHASIL!</h2>
            <p>Tipe: ${type.toUpperCase()}</p>
            <p style="font-family:monospace;font-size:10px;background:rgba(255,255,255,0.1);padding:10px;border-radius:8px;margin-top:10px;word-break:break-all;">${token.substring(0,30)}...</p>
            <p style="margin-top:30px;color:#888;font-size:12px;">Kembali ke Standby dalam 3 detik...</p>
        </div>
    `;
}


})();

</script>
</body>
</html>
