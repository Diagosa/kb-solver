<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=0">
    <title>KB Solver Frame</title>
    <style>
        body { 
            background: #1B1D25; color: #eaeaea; font-family: monospace; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; 
        }
        #status-text { font-size: 14px; margin-bottom: 20px; color: #aaa; text-align: center; }
    </style>
</head>
<body>
    <div id="status-text">Menyiapkan Environment...</div>
    <div id="captcha-container"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = (params.get('kb_type') || 'v3').toLowerCase();
        const sitekey = params.get('kb_sitekey');
        const action = params.get('kb_action') || 'submit';
        const st = document.getElementById('status-text');

        if (!sitekey) {
            st.innerHTML = "Standby Ready.<br><br><small>Halaman ini untuk worker otomatis.</small>";
        } else {
            st.innerHTML = `⚙️ Solving ${type.toUpperCase()}<br><small style="color:#555">${sitekey}</small>`;

            if (type === 'v3') {
                // MURNI API V3 (Tanpa UI berat)
                const script = document.createElement('script');
                script.src = `https://www.google.com/recaptcha/api.js?render=${sitekey}`;
                document.head.appendChild(script);

                script.onload = () => {
                    grecaptcha.ready(() => {
                        grecaptcha.execute(sitekey, { action: action }).then((token) => {
                            st.innerHTML = `✅ Execute OK!<br><span style="color:#4caf50;font-size:10px;">Token: ${token.substring(0, 15)}...</span>`;
                            // Post message akan ditangkap oleh Android Worker
                            window.postMessage({ type: "proxyGateResult", hash: token }, "*");
                        }).catch(e => {
                            st.innerHTML = `❌ Error Execute: ${e.message}`;
                        });
                    });
                };

            } else if (type === 'v2') {
                // MURNI IFRAME V2 (Persis web newtab kolo)
                st.innerHTML = `👆 Tap Checkbox V2 Dibawah`;
                
                window.postRecaptchaMessageJs = function(token) {
                    st.innerHTML = `✅ V2 Solved!<br><span style="color:#4caf50;font-size:10px;">Token: ${token.substring(0, 15)}...</span>`;
                    window.postMessage({ type: "proxyGateResult", hash: token }, "*");
                };

                const div = document.createElement('div');
                div.className = "g-recaptcha";
                div.setAttribute("data-sitekey", sitekey);
                div.setAttribute("data-callback", "postRecaptchaMessageJs");
                document.getElementById('captcha-container').appendChild(div);

                const script = document.createElement('script');
                script.src = "https://www.google.com/recaptcha/api.js";
                document.head.appendChild(script);
            }
        }
    </script>
</body>
</html>
