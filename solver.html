<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=0">
    <title>KB Solver v8.1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1B1D25;
            color: #eaeaea;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #status {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 99999;
            font-family: monospace;
            font-size: 12px;
            text-align: center;
            border: 1px solid #333;
            pointer-events: none;
            max-width: 90%;
        }
        #fallback {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spin {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #00bcd4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info { color: #888; font-size: 12px; font-family: monospace; }
        .error { color: #f44336; }
        .success { color: #4caf50; }
    </style>
</head>
<body>
    <div id="status">⏳ Memuat task...</div>
    <div id="fallback">
        <div class="spin"></div>
        <p>Menunggu token dari iframe...</p>
        <p class="info" id="info-msg"></p>
    </div>

    <script>
    (function() {
        'use strict';

        var params = new URLSearchParams(window.location.search);
        var taskId   = params.get('kb_task_id') || '';
        var type     = (params.get('kb_type') || '').toLowerCase();
        var sitekey  = params.get('kb_sitekey') || '';
        var fbUrl    = params.get('kb_fb') || 'https://kb-relay-default-rtdb.asia-southeast1.firebasedatabase.app';
        var htmlEncoded = params.get('kb_html') || '';

        var statusEl = document.getElementById('status');
        var fallbackEl = document.getElementById('fallback');
        var infoMsg = document.getElementById('info-msg');

        function setStatus(msg, isError) {
            statusEl.textContent = msg;
            statusEl.style.color = isError ? '#f44336' : '#fff';
        }

        if (!taskId || !type) {
            setStatus('⚠️ Tidak ada task ID');
            fallbackEl.style.display = 'block';
            infoMsg.textContent = 'Halaman ini digunakan oleh Android Worker.';
            return;
        }

        setStatus('⏳ Memproses task ' + taskId);

        // Jika ada HTML, render di iframe
        if (htmlEncoded) {
            try {
                var htmlContent = atob(decodeURIComponent(htmlEncoded));
                console.log('[KB Solver] HTML diterima, panjang=' + htmlContent.length);
                if (htmlContent.length < 50) {
                    setStatus('⚠️ HTML terlalu pendek, gunakan fallback');
                    fallbackEl.style.display = 'block';
                    infoMsg.textContent = 'HTML tidak lengkap, coba refresh.';
                } else {
                    // Buat iframe dengan sandbox lengkap
                    var iframe = document.createElement('iframe');
                    iframe.style.cssText = 'width:100%;height:100vh;border:none;position:fixed;top:0;left:0;z-index:9998;';
                    iframe.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals';
                    iframe.srcdoc = htmlContent;
                    document.body.appendChild(iframe);
                    // Hapus elemen lain
                    document.body.innerHTML = '';
                    document.body.appendChild(iframe);
                    document.body.appendChild(statusEl);
                    setStatus('⏳ Menunggu token...');

                    // Listen postMessage
                    var tokenSent = false;
                    window.addEventListener('message', function(event) {
                        if (tokenSent) return;
                        var d = event.data;
                        if (!d) return;
                        if (d.type === 'proxyGateResult' && d.hash && d.hash.length > 20) {
                            tokenSent = true;
                            setStatus('✅ Token diterima, mengirim ke Firebase...');
                            console.log('[KB Solver] Token diterima, kirim ke Firebase');
                            fetch(fbUrl + '/tokens/' + taskId + '.json', {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ token: d.hash, solvedAt: Date.now(), type: type })
                            })
                            .then(function(r) {
                                if (r.ok) {
                                    setStatus('✅ Sukses! Tutup dalam 3 detik...');
                                    fetch(fbUrl + '/queue/' + taskId + '.json', { method: 'DELETE' }).catch(function(){});
                                    setTimeout(function(){ window.close(); }, 3000);
                                } else {
                                    setStatus('❌ Gagal kirim ke Firebase', true);
                                }
                            })
                            .catch(function(e) {
                                setStatus('❌ Error: ' + e.message, true);
                            });
                        }
                    });

                    // Timeout 3 menit
                    setTimeout(function() {
                        if (!tokenSent) {
                            setStatus('⏰ Timeout, kembali ke standby', true);
                            setTimeout(function(){ window.location.replace(window.location.pathname); }, 2000);
                        }
                    }, 180000);
                }
            } catch(e) {
                setStatus('❌ Error decode HTML: ' + e.message, true);
                fallbackEl.style.display = 'block';
                infoMsg.textContent = 'Error: ' + e.message;
            }
        } else {
            // Tidak ada HTML, tampilkan fallback dengan widget standar (tapi token tidak valid)
            setStatus('⚠️ Mode lama (tanpa HTML) - token mungkin invalid');
            fallbackEl.style.display = 'block';
            infoMsg.textContent = 'Tidak ada HTML task. Token akan invalid untuk domain asli.';
        }

    })();
    </script>
</body>
</html>
